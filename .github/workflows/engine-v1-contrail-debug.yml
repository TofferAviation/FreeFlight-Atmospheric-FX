name: Build Engine v1 Contrail Visual Debug

on:
  workflow_dispatch:
  push:
    branches:
      - engine/v1
    paths:
      - "CMakeLists.txt"
      - "src/acf/**"
      - "src/diagnostics/**"
      - "src/engine/**"
      - "src/host/**"
      - "src/ContrailDebugPlugin.cpp"
      - "src/ContrailDebugOverlay.*"
      - "src/ContrailWorldRenderer.*"
      - "tools/generate_contrail_assets.py"
      - "tests/LiveContrailDebugTests.cpp"
      - ".github/workflows/engine-v1-contrail-debug.yml"
  pull_request:
    branches:
      - engine/v1
    paths:
      - "CMakeLists.txt"
      - "src/acf/**"
      - "src/diagnostics/**"
      - "src/engine/**"
      - "src/host/**"
      - "src/ContrailDebugPlugin.cpp"
      - "src/ContrailDebugOverlay.*"
      - "src/ContrailWorldRenderer.*"
      - "tools/generate_contrail_assets.py"
      - "tests/LiveContrailDebugTests.cpp"
      - ".github/workflows/engine-v1-contrail-debug.yml"

permissions:
  contents: read

concurrency:
  group: ffatmo-engine-v1-contrail-debug-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out live contrail debug source
        uses: actions/checkout@v4

      - name: Fetch X-Plane Plugin SDK 4.3.0
        id: xplane_sdk
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path third_party | Out-Null
          $archive = Join-Path $pwd "third_party/XPSDK430.zip"
          $destination = Join-Path $pwd "third_party/xplane-sdk"
          Invoke-WebRequest `
            -Uri "https://developer.x-plane.com/wp-content/plugins/code-sample-generation/sdk_zip_files/XPSDK430.zip" `
            -OutFile $archive
          Expand-Archive -LiteralPath $archive -DestinationPath $destination -Force
          $header = Get-ChildItem $destination -Recurse -Filter "XPLMPlugin.h" |
            Where-Object { $_.FullName.Replace('\', '/') -like '*/CHeaders/XPLM/XPLMPlugin.h' } |
            Select-Object -First 1
          if (-not $header) { throw "The X-Plane SDK archive did not contain XPLMPlugin.h" }
          $sdkRoot = Split-Path (Split-Path (Split-Path $header.FullName -Parent) -Parent) -Parent
          if (-not (Test-Path (Join-Path $sdkRoot "Libraries/Win/XPLM_64.lib"))) {
            throw "The X-Plane SDK Windows link library was not found"
          }
          "path=$sdkRoot" >> $env:GITHUB_OUTPUT

      - name: Configure live contrail debug build
        shell: pwsh
        run: >-
          cmake -S . -B build-contrail-debug -A x64
          -DXPLANE_SDK="${{ steps.xplane_sdk.outputs.path }}"
          -DFFATMO_BUILD_PLUGIN=OFF
          -DFFATMO_BUILD_COMPANION=OFF
          -DFFATMO_BUILD_IMGUI_PANEL=OFF
          -DFFATMO_BUILD_GEOMETRY_DEBUG=OFF
          -DFFATMO_BUILD_RECORDER_DEBUG=OFF
          -DFFATMO_BUILD_CONTRAIL_DEBUG=ON
          -DFFATMO_BUILD_REPLAY_RUNNER=OFF
          -DFFATMO_BUILD_TESTS=ON
          -DFFATMO_GIT_REVISION="${{ github.sha }}"

      - name: Build plugin and full deterministic tests
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build-logs | Out-Null
          & cmake --build build-contrail-debug --config Release --target FFAtmoContrailDebug ffatmo_core_tests ffatmo_acf_tests ffatmo_replay_tests ffatmo_replay_runner_tests ffatmo_contrail_tests ffatmo_live_contrail_debug_tests *> build-logs/build.txt
          $buildExit = $LASTEXITCODE
          if ($buildExit -ne 0) { exit $buildExit }
          & ctest --test-dir build-contrail-debug -C Release --output-on-failure *> build-logs/tests.txt
          $testExit = $LASTEXITCODE
          if ($testExit -ne 0) { exit $testExit }
          $plugin = "package/FFAtmoContrailDebug/64/win.xpl"
          if (-not (Test-Path $plugin)) { throw "Contrail visual-debug win.xpl was not produced" }
          if ((Get-Item $plugin).Length -lt 100000) { throw "Contrail visual-debug win.xpl is unexpectedly small" }

      - name: Generate world-renderer assets
        shell: pwsh
        run: |
          python tools/generate_contrail_assets.py generated-contrail-assets
          $objects = Get-ChildItem generated-contrail-assets -Filter "contrail_puff_*.obj"
          $textures = Get-ChildItem generated-contrail-assets -Filter "contrail_puff_*.png"
          if ($objects.Count -ne 4) { throw "Expected four generated contrail OBJ files" }
          if ($textures.Count -ne 4) { throw "Expected four generated contrail PNG files" }
          foreach ($texture in $textures) {
            if ($texture.Length -lt 1000) { throw "Generated texture is unexpectedly small: $($texture.Name)" }
          }

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: FFAtmoContrailDebug-build-diagnostics
          path: build-logs
          if-no-files-found: ignore
          retention-days: 7

      - name: Assemble visual-debug package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifact/FFAtmoContrailDebug/64 | Out-Null
          New-Item -ItemType Directory -Force -Path artifact/FFAtmoContrailDebug/assets | Out-Null
          Copy-Item package/FFAtmoContrailDebug/64/win.xpl artifact/FFAtmoContrailDebug/64/win.xpl -Force
          Copy-Item generated-contrail-assets/* artifact/FFAtmoContrailDebug/assets/ -Force
          @'
          FFAtmo Engine v1 World Contrail Visual Debug v2

          INSTALL
          Copy the FFAtmoContrailDebug folder into:
          X-Plane 12/Resources/plugins/

          Keep the included assets folder beside the 64 folder. This installs
          separately from FFAtmo, FFAtmoEngineRecorder, and FFAtmoEngineDebug.

          FIRST WORLD-SPACE TEST
          1. Load the Boeing 737-800NG and use an external rear-oblique camera.
          2. The forced preview now waits until the aircraft is at least 120 m AGL
             and 65 m/s true airspeed. It must not emit while parked or taxiing.
          3. After takeoff, fly straight for 30-60 seconds.
          4. The status panel must say WORLD OBJECTS READY.
          5. Cyan crosses remain only as tiny exhaust-alignment references.
          6. Contrail puffs are real X-Plane world objects with normal depth testing.
             They should pass behind the aircraft and scenery instead of drawing on top.
          7. There are no connector lines. Older parcels should spread, fade, descend,
             and show a first inward counter-rotating wake roll-up.

          ATMOSPHERE MODES
          - LIVE WEATHER: actual X-Plane atmosphere and engine state.
          - FORCED DRY PREVIEW: airborne-only formation followed by full decay.
          - FORCED PERSISTENT PREVIEW: airborne-only ice-supersaturated growth test.

          SEND BACK
          - one rear-oblique screenshot shortly after formation starts
          - one side/rear screenshot after 30-60 seconds
          - X-Plane 12/Log.txt
          - FFAtmoContrailDebug/reports/contrail_visual_debug.txt

          This remains an engineering world-object renderer. Texture density, parcel
          LODs, wake calibration, and final production atmospheric shaders come later.
          '@ | Set-Content artifact/FFAtmoContrailDebug/README_TESTING.txt -Encoding utf8
          "git_revision=${{ github.sha }}" | Set-Content artifact/FFAtmoContrailDebug/BUILD_INFO.txt -Encoding utf8

      - name: Upload live contrail visual debug plugin
        uses: actions/upload-artifact@v4
        with:
          name: FFAtmoContrailDebug-win64
          path: artifact/FFAtmoContrailDebug
          if-no-files-found: error
          retention-days: 14
